              # Side-By-Side
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Side[\s-]By[\s-]Side'
                      isRegex: True
                then:
                  - addLabel:
                      label: Side-By-Side
              # Zipped-Binary
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Zip(ped)?[\s-]Binary'
                      isRegex: True
                then:
                  - addLabel:
                      label: Zipped-Binary
              # Windows-Sandbox
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+(Windows[\s-])?Sandbox'
                      isRegex: True
                then:
                  - addLabel:
                      label: Windows-Sandbox
              # Unblocked
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Unblocked'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Blocking-Issue
              # Duplicate of #
              - if:
                  - commentContains:
                      pattern: Duplicate\s+of\s+\#?\s*\d+
                      isRegex: True
                then:
                  - addReply:
                      reply: >-
                        Hello @${issueAuthor},


                        We've identified this as a duplicate of another issue or PR that already exists. This specific instance is being closed in favor of the linked issue. Please add your 👍 to the other issue to raise its priority. Thanks for your contribution!


                        Template: msftbot/duplicate/closed
                  - closeIssue
                  - removeLabel:
                      label: Needs-Triage
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Feedback-Hub
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - addLabel:
                      label: Resolution-Duplicate
              # Close with reason <>;
              - if:
                  - commentContains:
                      pattern: "[cC]lose\\s+[wW]ith\\s+[rR]eason\\s*:[\\w\\s\\-\\(\\)\\[\\]\\{\\}\\\\\\/.+=@\\#$%&^*`~|'\",<>?]*(?=;)"
                      isRegex: True
                then:
                  - closeIssue
                  - removeLabel:
                      label: Needs-Triage
                  - removeLabel:
                      label: Needs-Attention
                  - removeLabel:
                      label: Needs-Feedback-Hub
                  - removeLabel:
                      label: Needs-Author-Feedback
              # Reopen with reason <>;
              - if:
                  - commentContains:
                      pattern: "[rR]eopen\\s+[wW]ith\\s+[rR]eason\\s*:[\\w\\s\\-\\(\\)\\[\\]\\{\\}\\\\\\/.+=@\\#$%&^*`~|'\",<>?]*(?=;)"
                      isRegex: True
                then:
                  - reopenIssue
                  - removeLabel:
                      label: Resolution-Duplicate
                  - removeLabel:
                      label: No-Recent-Activity
              # Reset-Feedback
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Reset\s+Feedback'
                      isRegex: True
                then:
                  - removeLabel:
                      label: Needs-Author-Feedback
                  - removeLabel:
                      label: Needs-Attention
              # Reset-Labels
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Reset\s+Labels'
                      isRegex: True
                then:
                  - removeLabel:
