                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Source
              # Command-Uninstall
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Uninstall'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Uninstall
              # Command-Upgrade
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Upgrade'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Upgrade
              # Command-Validate
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Validate'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Validate
              # Context-Elevated-User
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Context[\s-]Elevated([\s-]User)?'
                      isRegex: True
                then:
                  - addLabel:
