                      isRegex: True
                then:
                  - addLabel:
                      label: Command-List
              # Command-MCP
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]MCP'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-MCP
              # Command-Pin
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Pin'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Pin
              # Command-Repair
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Repair'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Repair
              # Command-Search
              - if:
                  - commentContains:
