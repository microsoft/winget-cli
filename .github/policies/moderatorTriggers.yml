                then:
                  - addLabel:
                      label: Command-Export
              # Command-Features
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Features'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Features
              # Command-Font
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Command[\s-]Font'
                      isRegex: True
                then:
                  - addLabel:
                      label: Command-Font
              # Command-Hash
              - if:
                  - commentContains:
