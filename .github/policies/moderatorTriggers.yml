id: moderatorTriggers
name: GitOps.PullRequestIssueManagement
description: Defines the users and permissions for the moderators
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    eventResponderTasks:
      - if:
          # If the activity sender is any one of the moderators, has Admin permission on the repo, or has Write permissions on the repo. . .
          - or:
              - activitySenderHasPermission:
                  permission: Admin
              - activitySenderHasPermission:
                  permission: Write
              - isActivitySender:
                  user: stephengillie
                  issueAuthor: False
              - isActivitySender:
                  user: ImJoakim
                  issueAuthor: False
              - isActivitySender:
                  user: ItzLevvie
                  issueAuthor: False
              - isActivitySender:
                  user: jedieaston
                  issueAuthor: False
              - isActivitySender:
                  user: KaranKad
                  issueAuthor: False
              - isActivitySender:
                  user: OfficialEsco
                  issueAuthor: False
              - isActivitySender:
                  user: quhxl
                  issueAuthor: False
              - isActivitySender:
                  user: Trenly
                  issueAuthor: False
              - isActivitySender:
                  user: mdanish-kh
                  issueAuthor: False
              - isActivitySender:
                  user: russellbanks
                  issueAuthor: False
        then:
          # If the payload is an issue_Comment or a Pull_Request_Review_Comment
          - if:
              - or:
                  - payloadType: Issue_Comment
                  - payloadType: Pull_Request_Review_Comment
            # Remove the Needs-Triage label
            # Take different actions based on the comment pattern
            then:
              - removeLabel:
                  label: Needs-Triage
              # Area-Accessibility
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Accessibility'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Accessibility
              # Area-Architecture
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Architecture'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Architecture
              # Area-Build
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Build'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Build
              # Area-COM-API
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]COM[\s-]API'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-COM-API
              # Area-External
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]External'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-External
              # Area-GPO
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]GPO'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-GPO
              # Area-Input
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Input'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Input
              # Area-Localization
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Localization'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Localization
              # Area-Manifest
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Manifest'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Manifest
              # Area-Matching
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Matching'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Matching
              # Area-Output
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Area[\s-]Output'
                      isRegex: True
                then:
                  - addLabel:
                      label: Area-Output
              # Area-Path
              - if:
