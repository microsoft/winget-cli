              # Interactive-Only-Installer
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Interactive[\s-]Only([\s-]Installer)?'
                      isRegex: True
                then:
                  - addLabel:
                      label: Interactive-Only-Installer
              # Issue-Bug
              - if:
                  - commentContains:
                      pattern: '(?in)\[Policy\]\s+Issue[\s-]Bug'
                      isRegex: True
                then:
                  - addLabel:
                      label: Issue-Bug
              # Issue-Docs
              - if:
