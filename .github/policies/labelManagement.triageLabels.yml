id: labelAdded.triageLabels
name: GitOps.PullRequestIssueManagement
description: Handlers for triaging issues when various labels are applied from Triage
owner:
resource: repository
disabled: false
where:
configuration:
  resourceManagementConfiguration:
    eventResponderTasks:
      - description: >-
          When specific labels are added to an issue
          * Remove the Needs-Triage label
        if:
          - payloadType: Issues
          - or:
              # Area labels — only applied manually during triage
              - labelAdded:
                  label: Area-Accessibility
              - labelAdded:
                  label: Area-Architecture
              - labelAdded:
                  label: Area-Build
              - labelAdded:
                  label: Area-External
              - labelAdded:
                  label: Area-GPO
              - labelAdded:
                  label: Area-Input
              - labelAdded:
                  label: Area-Localization
              - labelAdded:
                  label: Area-Manifest
              - labelAdded:
                  label: Area-Matching
              - labelAdded:
                  label: Area-Output
              - labelAdded:
                  label: Area-Path
              - labelAdded:
                  label: Area-Performance
              - labelAdded:
                  label: Area-Scope
              - labelAdded:
                  label: Area-Settings
              - labelAdded:
                  label: Area-Sorting
              - labelAdded:
                  label: Area-User-Interface
              # Issue type / context / feature labels — manually applied
              - labelAdded:
                  label: Breaking-Change
              - labelAdded:
                  label: Context-Elevated-User
              - labelAdded:
                  label: Context-User
              - labelAdded:
                  label: Context-System
              - labelAdded:
                  label: Dependencies
              - labelAdded:
                  label: Experimental
              - labelAdded:
                  label: Hardware
              - labelAdded:
                  label: In-PR
              - labelAdded:
                  label: Interactive-Only-Installer
              - labelAdded:
                  label: Issue-Bug
              - labelAdded:
                  label: Issue-Docs
              - labelAdded:
                  label: Issue-Feature
              - labelAdded:
                  label: msstore
              - labelAdded:
                  label: Needs-Attention
              - labelAdded:
                  label: Needs-Repro
              - labelAdded:
                  label: Portable
              - labelAdded:
                  label: Public-Service-Announcement
              - labelAdded:
                  label: Side-By-Side
              - labelAdded:
                  label: Windows-Sandbox
              - labelAdded:
                  label: Zipped-Binary
              # Needs-Author-Feedback is only auto-applied on PR open (localization),
              # not on issue open, so it is safe to include here.
              - labelAdded:
                  label: Needs-Author-Feedback
              # NOTE: Command-*, DSC-Resource, PowerShell, and Blocking-Issue
              # are excluded because they are auto-applied by issueOpened and
              # would prematurely remove Needs-Triage before a human has triaged
              # the issue.
        then:
          - removeLabel:
              label: Needs-Triage
        # The policy service should trigger even when the label was added by the policy service
        triggerOnOwnActions: true
onFailure:
onSuccess:
